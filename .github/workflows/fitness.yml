# ==============================================================================
# FITNESS FUNCTION: GUARDIÃO DE ARQUITETURA E QUALIDADE (RUST)
# ==============================================================================
# Este workflow atua como uma "Fitness Function" automatizada. Ele garante que
# o código evolua sem perder atributos essenciais de qualidade.
#
# VERIFICAÇÕES REALIZADAS:
# 1. COMPLEXIDADE COGNITIVA: Bloqueia funções difíceis de manter (via Clippy).
# 2. TESTES UNITÁRIOS: Garante que toda a lógica de negócio esteja funcionando.
# 3. COBERTURA MÍNIMA (80%): Impede o merge se o código novo não tiver testes.
# 4. FEEDBACK VISUAL: Posta uma tabela de cobertura diretamente no Pull Request.
# ==============================================================================

name: Fitness Functions

on:
  pull_request:
  push:
    branches: [main]

jobs:
  quality-gate:
    name: Architecture Guard # Nome que aparece no "Branch Protection / Rulesets"
    runs-on: ubuntu-latest

    # Permissões para que o GitHub Actions possa comentar no seu Pull Request
    permissions:
      contents: read
      pull-requests: write
      checks: write
      statuses: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, llvm-tools-preview

      - name: Install Coverage Tool (cargo-llvm-cov)
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Run Tests & Generate Data
        # 1. Roda os testes e guarda os dados brutos (mesmo que falhe)
        run: |
          cargo llvm-cov --all-features --workspace --no-report || echo "failed" > test_result

      - name: Generate LCOV Report
        # 2. Gera o arquivo .info a partir dos dados que o passo anterior coletou
        run: |
          cargo llvm-cov report --lcov --output-path lcov.info \
            --ignore-filename-regex "tests/|test/|main.rs|build.rs"

      - name: Pytest coverage comment
        uses: MishaKav/pytest-coverage-comment@main
        with:
          pytest-coverage-path: lcov.info
          github-token: ${{ secrets.GITHUB_TOKEN }}
        if: always()

      - name: Final Quality Gate
        run: |
          # Se o arquivo test_result existe, o teste falhou
          if [ -f test_result ]; then
            echo "❌ Falha nos testes unitários detectada!"
            exit 1
          fi
          # Se os testes passaram, verifica a cobertura de 80%
          cargo llvm-cov --fail-under-lines 80 --no-run --lcov --output-path lcov.info \
            --ignore-filename-regex "tests/|test/|main.rs|build.rs"

      - name: Get Coverage Percentage
        id: coverage_percent
        run: |
          # Extrai a porcentagem total do arquivo lcov
          TOTAL=$(lcov --summary lcov.info | grep "lines......" | cut -d ' ' -f 4 | cut -d '%' -f 1)
          echo "PERCENT=$TOTAL" >> $GITHUB_OUTPUT

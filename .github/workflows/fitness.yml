# ==============================================================================
# FITNESS FUNCTION: GUARDIÃO DE ARQUITETURA E QUALIDADE (RUST)
# ==============================================================================
# Este workflow atua como uma "Fitness Function" automatizada. Ele garante que
# o código evolua sem perder atributos essenciais de qualidade.
#
# VERIFICAÇÕES REALIZADAS:
# 1. COMPLEXIDADE COGNITIVA: Bloqueia funções difíceis de manter (via Clippy).
# 2. TESTES UNITÁRIOS: Garante que toda a lógica de negócio esteja funcionando.
# 3. COBERTURA MÍNIMA (80%): Impede o merge se o código novo não tiver testes.
# ==============================================================================

name: Fitness Functions

on:
  pull_request:
  push:
    branches: [main]

jobs:
  quality-gate:
    name: Architecture Guard
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, llvm-tools-preview

      - name: Install Coverage Tool
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: 🛡️ Rule 1 - Complexity Check
        # Falha o build se o código for difícil de manter (conforme clippy.toml)
        run: cargo clippy --all-features -- -D clippy::cognitive_complexity

      - name: 🛡️ Rule 2 & 3 - Run Tests & Check Coverage (Min 80%)
        # Este comando faz tudo: roda os testes e falha se algum falhar OU
        # se a cobertura for menor que 80%.
        # Ignora arquivos de teste e configurações para o cálculo ser justo.
        run: |
          cargo llvm-cov --all-features --workspace \
            --ignore-filename-regex "tests/|test/|main.rs|build.rs" \
            --fail-under-lines 80

      - name: Get Coverage Percentage
        id: coverage_percent
        run: |
          # Extrai a porcentagem total do arquivo lcov
          TOTAL=$(lcov --summary lcov.info | grep "lines......" | cut -d ' ' -f 4 | cut -d '%' -f 1)
          echo "PERCENT=$TOTAL" >> $GITHUB_OUTPUT
